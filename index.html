<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Gastos Sincronizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen py-6 px-4 font-sans antialiased">

    <div class="max-w-md mx-auto bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden p-5">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold tracking-wide text-white">Control de Gastos</h1>
            <span id="status-cloud" class="bg-yellow-500/20 text-yellow-400 text-xs font-semibold px-2.5 py-1 rounded-full border border-yellow-500/30">Conectando...</span>
        </div>
        
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-5 rounded-xl mb-6 shadow-lg shadow-blue-900/20">
            <p class="text-blue-100 text-sm font-medium mb-1">Total Gastado General (Nube)</p>
            <div class="flex justify-between items-baseline">
                <span id="total-amount" class="text-3xl font-extrabold tracking-tight">0.00</span>
                <span class="text-xs text-blue-200 bg-white/10 px-2 py-0.5 rounded">Bs / $</span>
            </div>
        </div>

        <form id="expense-form" class="space-y-4 mb-6 bg-gray-850 p-4 rounded-xl border border-gray-700/50">
            <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Nuevo Registro</h2>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Monto</label>
                    <input type="number" id="amount" step="0.01" required class="block w-full rounded-lg bg-gray-700 border-none text-white font-bold p-3 focus:ring-2 focus:ring-blue-500 text-lg placeholder-gray-500" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Fecha</label>
                    <input type="date" id="date" required class="block w-full rounded-lg bg-gray-700 border-none text-white p-3 focus:ring-2 focus:ring-blue-500 text-sm">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Categoría</label>
                <select id="category" class="block w-full rounded-lg bg-gray-700 border-none text-white p-3 focus:ring-2 focus:ring-blue-500 text-sm">
                    <option value="Alimentación">🍔 Alimentación</option>
                    <option value="Transporte">🚌 Transporte</option>
                    <option value="Pagos de Servicios">💡 Pagos de Servicios</option>
                    <option value="Gasolina">⛽ Gasolina</option>
                    <option value="Insumos de Taller">🛠️ Insumos de Taller</option>
                    <option value="Otros">📦 Otros</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Descripción</label>
                <input type="text" id="description" class="block w-full rounded-lg bg-gray-700 border-none text-white p-3 focus:ring-2 focus:ring-blue-500 text-sm placeholder-gray-500" placeholder="Ej. Filtros, almuerzo, luz...">
            </div>

            <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-lg font-bold hover:bg-blue-600 active:scale-[0.98] transition duration-150 shadow-md shadow-blue-500/10">
                ＋ Añadir Gasto
            </button>
        </form>

        <div class="mb-6">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Distribución de Gastos</h2>
            <div id="category-summary" class="grid grid-cols-2 gap-2 text-xs">
                </div>
        </div>

        <div>
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Historial Reciente</h2>
                <div class="space-x-2">
                    <button onclick="fetchExpenses()" class="text-xs text-indigo-400 hover:underline">🔄 Sincronizar</button>
                    <button onclick="exportToText()" class="text-xs text-blue-400 hover:underline">📤 Compartir</button>
                </div>
            </div>
            <ul id="expense-list" class="space-y-2.5 max-h-64 overflow-y-auto pr-1">
                </ul>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE ACCESOS ÚNICA CONECTADA
        // ==========================================
        const SUPABASE_URL = "https://ucrmprqhwmzjregdzago.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_ODCQ41kCRqaF5p_TmeBc5Q_pyxzOuqi"; 
        
        // Inicializar el cliente una sola vez de forma correcta
        const clientSupabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        // ==========================================

        const expenseForm = document.getElementById('expense-form');
        const expenseList = document.getElementById('expense-list');
        const totalAmountEl = document.getElementById('total-amount');
        const categorySummaryEl = document.getElementById('category-summary');
        const statusCloud = document.getElementById('status-cloud');

        let expenses = [];
        document.getElementById('date').valueAsDate = new Date();

        // Obtener registros desde la base de datos en la nube
        async function fetchExpenses() {
            statusCloud.textContent = "Sincronizando...";
            statusCloud.className = "bg-yellow-500/20 text-yellow-400 text-xs font-semibold px-2.5 py-1 rounded-full border border-yellow-500/30";
            
            const { data, error } = await clientSupabase
                .from('gastos')
                .select('*')
                .order('id_gasto', { ascending: false }); // CAMBIADO A TU ID REAL: id_gasto

            if (error) {
                console.error(error);
                statusCloud.textContent = "Error de Red";
                statusCloud.className = "bg-red-500/20 text-red-400 text-xs font-semibold px-2.5 py-1 rounded-full border border-red-500/30";
            } else {
                expenses = data;
                updateUI();
                statusCloud.textContent = "Sincronizado";
                statusCloud.className = "bg-green-500/20 text-green-400 text-xs font-semibold px-2.5 py-1 rounded-full border border-green-500/30";
            }
        }

        function updateUI() {
            expenseList.innerHTML = '';
            let total = 0;
            
            const categoriesTotal = {
                "Alimentación": 0, "Transporte": 0, "Pagos de Servicios": 0,
                "Gasolina": 0, "Insumos de Taller": 0, "Otros": 0
            };

            expenses.forEach((expense) => {
                const amt = parseFloat(expense.amount || 0);
                total += amt;
                const cat = expense.category || "Otros";
                const desc = expense.description || "";
                const fechaGasto = expense.date || "";
                
                if (categoriesTotal[cat] !== undefined) {
                    categoriesTotal[cat] += amt;
                } else {
                    categoriesTotal["Otros"] += amt;
                }

                let icon = "📦";
                if(cat === "Alimentación") icon = "🍔";
                if(cat === "Transporte") icon = "🚌";
                if(cat === "Pagos de Servicios") icon = "💡";
                if(cat === "Gasolina") icon = "⛽";
                if(cat === "Insumos de Taller") icon = "🛠️";

                const li = document.createElement('li');
                li.className = "flex justify-between items-center p-3 bg-gray-800/60 rounded-xl border border-gray-700/50 shadow-sm";
                li.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="text-xl p-1.5 bg-gray-700 rounded-lg">${icon}</span>
                        <div>
                            <p class="font-semibold text-sm text-white">${desc || cat}</p>
                            <p class="text-[11px] text-gray-400">${fechaGasto} • <span class="text-blue-400">${cat}</span></p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="font-bold text-sm text-white">${amt.toFixed(2)}</span>
                        <button onclick="deleteExpense(${expense.id_gasto})" class="text-gray-500 hover:text-red-400 font-bold p-1">✕</button>
                    </div>
                `; // CAMBIADO A TU ID REAL: expense.id_gasto
                expenseList.appendChild(li);
            });

            totalAmountEl.textContent = total.toFixed(2);

            categorySummaryEl.innerHTML = '';
            for (const [cat, val] of Object.entries(categoriesTotal)) {
                if (val > 0) {
                    const div = document.createElement('div');
                    div.className = "bg-gray-850 p-2.5 rounded-lg border border-gray-700/30 flex justify-between items-center";
                    div.innerHTML = `
                        <span class="text-gray-400 truncate mr-1">${cat}</span>
                        <span class="font-bold text-white">${val.toFixed(2)}</span>
                    `;
                    categorySummaryEl.appendChild(div);
                }
            }
        }

        // Registrar nuevo gasto en la nube
        expenseForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const rawCategory = document.getElementById('category').value;
            const cleanCategory = rawCategory.replace(/[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDC00-\uDFFF]/g, '').trim();

            const newExpense = {
                amount: parseFloat(document.getElementById('amount').value),
                category: cleanCategory,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value
            };

            const { error } = await clientSupabase.from('gastos').insert([newExpense]);

            if (error) {
                alert("Error al guardar en la nube: " + error.message);
            } else {
                document.getElementById('amount').value = '';
                document.getElementById('description').value = '';
                document.getElementById('date').valueAsDate = new Date();
                fetchExpenses(); // Recargar historial sincronizado
            }
        });

        // Eliminar registro desde la nube usando la columna 'id_gasto'
        async function deleteExpense(id_gasto) {
            if(confirm("¿Seguro que quieres borrar este registro de la nube?")) {
                const { error } = await clientSupabase.from('gastos').delete().eq('id_gasto', id_gasto); // CAMBIADO A TU ID REAL: id_gasto
                if (error) {
                    alert("Error al eliminar de la nube");
                } else {
                    fetchExpenses();
                }
            }
        }

        function exportToText() {
            if(expenses.length === 0) return alert("No hay gastos registrados para compartir.");
            
            let text = `📋 *REPORTE DE GASTOS*\n`;
            let total = 0;
            expenses.forEach(e => {
                const amt = parseFloat(e.amount || 0);
                const cat = e.category || "Otros";
                const desc = e.description || "Sin detalle";
                const fechaGasto = e.date || "";
                
                text += `• [${fechaGasto}] ${cat}: ${amt.toFixed(2)} (${desc})\n`;
                total += amt;
            });
            text += `\n💰 *TOTAL GASTADO:* ${total.toFixed(2)}`;

            navigator.clipboard.writeText(text).then(() => {
                alert("¡Reporte copiado al portapapeles! Ya puedes pegarlo en WhatsApp.");
            });
        }

        // Carga inicial conectando con la base de datos
        fetchExpenses();
    </script>
</body>
</html>
